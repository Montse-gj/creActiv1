<body>
    <header class="nav-header">
        <a href="index.html" target="_blank" rel=""><img class="logo" src="assets/img/ui/creActiveLogo.jpg"></a>

                <select name="activity" id="activity">

                </select>
                <button type="submit">Buscar</button>
            </form>
        </section>
        <section class="claim">
            <h2>Talleres creativos de un día</h2>
            <p>Conectamos talento, espacios y personas en experiencias creativas.</p>
